<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum Komputasi Numerik</title>
    <link rel="stylesheet" href="praktikum1.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    
    <div class="header">
        <h1>Praktikum Komputasi Numerik</h1>
        <h2>Kelompok 7</h2>
        <h3>
            <p>I Dewa Gede Putra Susila</p>
            <p>I Dewa Gede Putra Susila</p>
            <p>I Dewa Gede Putra Susila</p>
        </h3>
    </div>
    

    <div class="input">
        <label for="func">f(x):</label>
        <input type="text" class="fullbutton" id="func"><br>

        <label for="x1">x<sub>1</sub>:</label>
        <input type="number" class="halfbutton" id="x1">

        <label for="x2">x<sub>2</sub>:</label>

        <label for="iterasi">Iterasi:</label>
        <input type="number" class="halfbutton" id="iterasi">

        <input type="number" class="halfbutton" id="presisi"><br>

        <label for="rumus">Rumus yang ingin digunakan</label>
        <select name="rumus" class="fullbutton" id="rumus">
            <option value="regula-falsi">Metode Regula Falsi</option>
            <option value="secant">Metode Secant</option>
        </select><br>

        <button onclick="hitung()" class="fullbutton" id="hitung">Hitung</button>

    <div id="tabel"></div>
