<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Metode Bolzano</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <style>
    :root {
      --bg: #111010;
      --surface: #181716;
      --surface2: #201e1d;
      --accent: #c8c0b4;
      --accent2: #8a8078;
      --accent3: #e8e0d4;
      --text: #d4cdc6;
      --muted: #5a5550;
      --border: rgba(200,192,180,0.12);
      --glow: rgba(200,192,180,0.10);
      --white: #ede8e2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px;
      /* grain overlay */
      position: relative;
    }

    /* film grain effect */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* subtle vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 998;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
    }

    .header { text-align: center; margin-bottom: 36px; }

    .header .badge {
      display: inline-block;
      background: transparent;
      border: 1px solid rgba(200,192,180,0.25);
      color: var(--accent2);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      padding: 5px 16px;
      border-radius: 0;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 8px;
      font-weight: 300;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
    }

    /* horizontal rule divider */
    .divider {
      border: none;
      border-top: 1px solid rgba(200,192,180,0.1);
      margin: 0 0 20px 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(200,192,180,0.08);
      border-radius: 4px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }

    /* top-left corner accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 30px; height: 2px;
      background: var(--accent2);
      opacity: 0.5;
    }

    .card-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--accent2);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }

    input[type="text"], input[type="number"] {
      background: var(--surface2);
      border: 1px solid rgba(200,192,180,0.1);
      border-radius: 2px;
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 0.88rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus {
      border-color: rgba(200,192,180,0.4);
      background: #252320;
    }

    .btn {
      display: block; width: 100%; margin-top: 20px; padding: 13px;
      background: var(--white);
      border: none; border-radius: 2px;
      color: #111010;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem; font-weight: 700;
      cursor: pointer; letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #d4cdc6; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; font-size: 0.78rem; }

    thead th {
      background: rgba(200,192,180,0.05);
      color: var(--accent2);
      padding: 10px 14px; text-align: center;
      border-bottom: 1px solid rgba(200,192,180,0.1);
      letter-spacing: 2px; font-size: 0.65rem; text-transform: uppercase;
    }

    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.15s; }
    tbody tr:hover { background: rgba(200,192,180,0.04); }
    tbody tr:last-child { background: rgba(200,192,180,0.06); border-bottom: 1px solid rgba(200,192,180,0.15); }
    tbody tr:last-child td { color: var(--white); }

    td { padding: 9px 14px; text-align: center; color: #8a8078; }
    td:first-child { color: rgba(200,192,180,0.5); font-weight: 700; }

    .chart-wrap { position: relative; height: 340px; }

    .chart-toolbar {
      display: flex; gap: 8px; margin-bottom: 12px;
      align-items: center; flex-wrap: wrap;
    }

    .tool-btn {
      background: transparent;
      border: 1px solid rgba(200,192,180,0.15);
      border-radius: 2px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem; letter-spacing: 1px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .tool-btn:hover { border-color: rgba(200,192,180,0.4); color: var(--accent); }
    .tool-btn.active { background: rgba(200,192,180,0.1); border-color: rgba(200,192,180,0.35); color: var(--accent3); }

    .tool-sep { width: 1px; height: 24px; background: rgba(200,192,180,0.1); margin: 0 4px; }

    .hint { font-size: 0.65rem; color: var(--muted); margin-left: auto; font-family: 'Space Mono', monospace; letter-spacing: 0.5px; }

    .result-chip {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(200,192,180,0.06);
      border: 1px solid rgba(200,192,180,0.15);
      border-radius: 2px; padding: 10px 20px;
      font-family: 'Space Mono', monospace; font-size: 0.85rem;
      color: var(--white); margin-bottom: 4px;
    }

    .result-chip span { color: var(--muted); font-size: 0.7rem; letter-spacing: 1px; }

    #result-area { display: none; }
    #result-area.show { display: block; }
  </style>
</head>
<body>

<div class="header">
  <div class="badge">Numerical Methods</div>
  <h1>Metode Bolzano</h1>
  <p class="subtitle">Bisection Method · Root Finding</p>
</div>

<div class="card">
  <div class="card-title">// Parameter Input</div>
  <div class="input-grid">
    <div class="input-group full">
      <label>Fungsi f(x)</label>
      <input type="text" id="func" value="x*x*x - 3*x + 1">
    </div>
    <div class="input-group">
      <label>Batas Bawah (a)</label>
      <input type="number" id="a" value="1" step="any">
    </div>
    <div class="input-group">
      <label>Batas Atas (b)</label>
      <input type="number" id="b" value="2" step="any">
    </div>
    <div class="input-group full">
      <label>Jumlah Iterasi</label>
      <input type="number" id="n" value="5" min="1" max="50">
    </div>
  </div>
  <button class="btn" onclick="hitung()">▶ Hitung Akar</button>
</div>

<div id="result-area">
  <div class="card">
    <div class="card-title">// Hasil Akar</div>
    <div id="root-chip"></div>
  </div>

  <div class="card">
    <div class="card-title">// Tabel Iterasi</div>
    <div class="table-wrap" id="output"></div>
  </div>

  <div class="card">
    <div class="card-title">// Grafik Interaktif f(x)</div>
    <div class="chart-toolbar">
      <button class="tool-btn" onclick="zoomIn()">+ Zoom In</button>
      <button class="tool-btn" onclick="zoomOut()">− Zoom Out</button>
      <div class="tool-sep"></div>
      <button class="tool-btn active" id="btn-pan" onclick="setMode('pan')">✋ Pan</button>
      <button class="tool-btn" id="btn-zoom-drag" onclick="setMode('zoom')">⬚ Area</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="resetZoom()">↺ Reset</button>
      <span class="hint">scroll = zoom · drag = geser</span>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>
</div>

<script>
function parseFunction(expr) {
  return function(x) { try { return eval(expr); } catch { return NaN; } };
}

function setMode(mode) {
  document.getElementById('btn-pan').classList.toggle('active', mode === 'pan');
  document.getElementById('btn-zoom-drag').classList.toggle('active', mode === 'zoom');
  if (window._chart) {
    window._chart.options.plugins.zoom.zoom.drag.enabled = (mode === 'zoom');
    window._chart.options.plugins.zoom.pan.enabled = (mode === 'pan');
    window._chart.update();
  }
}

function zoomIn() { if (window._chart) window._chart.zoom(1.3); }
function zoomOut() { if (window._chart) window._chart.zoom(0.77); }
function resetZoom() { if (window._chart) window._chart.resetZoom(); }

function hitung() {
  let expr = document.getElementById("func").value;
  let f = parseFunction(expr);
  let a = parseFloat(document.getElementById("a").value);
  let b = parseFloat(document.getElementById("b").value);
  let n = parseInt(document.getElementById("n").value);

  let output = `<table><thead><tr><th>Iter</th><th>a</th><th>b</th><th>xr</th><th>f(xr)</th></tr></thead><tbody>`;
  let xr, titikIterasi = [];

  for (let i = 1; i <= n; i++) {
    xr = (a + b) / 2;
    let fxr = f(xr);
    titikIterasi.push({ x: xr, y: fxr });
    output += `<tr><td>${i}</td><td>${a.toFixed(6)}</td><td>${b.toFixed(6)}</td><td>${xr.toFixed(6)}</td><td>${fxr.toFixed(6)}</td></tr>`;
    if (f(a) * fxr < 0) b = xr; else a = xr;
  }

  output += "</tbody></table>";
  document.getElementById("output").innerHTML = output;
  document.getElementById("root-chip").innerHTML = `<div class="result-chip"><span>AKAR ≈</span> x = ${xr.toFixed(8)}</div>`;
  document.getElementById("result-area").classList.add("show");

  let data = [];
  let xr_last = xr;
  let aOrig = parseFloat(document.getElementById("a").value);
  let bOrig = parseFloat(document.getElementById("b").value);
  let range = Math.abs(bOrig - aOrig);
  let xStart = xr_last - range * 4;
  let xEnd   = xr_last + range * 4;
  if (range < 0.01) { xStart -= 1.5; xEnd += 1.5; }
  let step = (xEnd - xStart) / 400;
  let yMin = Infinity, yMax = -Infinity;

  for (let x = xStart; x <= xEnd; x += step) {
    let y = f(x);
    if (isFinite(y)) { data.push({ x, y }); yMin = Math.min(yMin, y); yMax = Math.max(yMax, y); }
  }
  titikIterasi.forEach(p => { yMin = Math.min(yMin, p.y); yMax = Math.max(yMax, p.y); });

  let ctx = document.getElementById("chart");
  if (window._chart instanceof Chart) window._chart.destroy();

  // grayscale palette for iteration points
  const totalIter = titikIterasi.length;
  const iterColors = titikIterasi.map((_, i) => {
    const l = 30 + (i / Math.max(totalIter - 1, 1)) * 55;
    return `hsl(0,0%,${l}%)`;
  });

  window._chart = new Chart(ctx, {
    type: "line",
    data: {
      datasets: [
        {
          label: "f(x)",
          data,
          borderColor: "#c8c0b4",
          borderWidth: 2,
          fill: false,
          pointRadius: 0,
          tension: 0.2
        },
        {
          label: "Titik Iterasi",
          data: titikIterasi,
          pointRadius: 6,
          pointBackgroundColor: iterColors,
          pointBorderColor: 'rgba(255,255,255,0.15)',
          pointBorderWidth: 1,
          showLine: false
        },
        {
          label: "Akar",
          data: [{ x: xr_last, y: f(xr_last) }],
          pointRadius: 10,
          pointBackgroundColor: "#ede8e2",
          pointBorderColor: "#5a5550",
          pointBorderWidth: 2,
          showLine: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: false,
      animation: { duration: 400 },
      plugins: {
        legend: {
          labels: { color: "#5a5550", font: { family: "'Space Mono', monospace", size: 11 }, boxWidth: 10 }
        },
        tooltip: {
          backgroundColor: '#181716',
          borderColor: 'rgba(200,192,180,0.2)',
          borderWidth: 1,
          titleColor: '#8a8078',
          bodyColor: '#c8c0b4',
          callbacks: { label: ctx => ` (${ctx.parsed.x.toFixed(4)}, ${ctx.parsed.y.toFixed(4)})` }
        },
        zoom: {
          pan: { enabled: true, mode: 'xy', threshold: 5 },
          zoom: {
            wheel: { enabled: true, speed: 0.1 },
            pinch: { enabled: true },
            drag: { enabled: false, backgroundColor: 'rgba(200,192,180,0.08)', borderColor: 'rgba(200,192,180,0.3)', borderWidth: 1 },
            mode: 'xy',
          },
          limits: { x: { min: xStart - 2, max: xEnd + 2 }, y: { min: yMin - 3, max: yMax + 3 } }
        }
      },
      scales: {
        x: {
          type: "linear",
          title: { display: true, text: "x", color: "#5a5550", font: { family: 'Space Mono' } },
          grid: { color: "rgba(255,255,255,0.04)" },
          ticks: { color: "#5a5550", font: { family: "'Space Mono'" } }
        },
        y: {
          min: yMin - 0.5, max: yMax + 0.5,
          title: { display: true, text: "f(x)", color: "#5a5550", font: { family: 'Space Mono' } },
          grid: { color: "rgba(255,255,255,0.04)" },
          ticks: { color: "#5a5550", font: { family: "'Space Mono'" } }
        }
      }
    }
  });
}

hitung();
</script>
</body>
</html>
